name: Update GRIP-EMS Version

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest GRIP-EMS version from CurseForge page
        id: fetch_version
        run: |
          RESPONSE=$(curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://www.curseforge.com/wow/addons/grip-enhanced-macro-sequencer")
          
          VERSION=$(echo "$RESPONSE" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          # Look for GRIP-EMS version strings like v2.1.12 - exclude WoW patch versions
          # WoW versions look like 12.0.x, addon versions look like 2.x.x or 1.x.x
          matches = re.findall(r'GRIP[^\"<>]{0,30}(v?[12]\.\d+\.\d+)', html)
          addon_versions = []
          for m in matches:
              # Skip WoW game versions (12.x.x) and keep addon versions (1.x.x or 2.x.x)
              parts = m.lstrip('v').split('.')
              if int(parts[0]) <= 9:
                  v = m if m.startswith('v') else 'v' + m
                  addon_versions.append(v)
          
          if addon_versions:
              print(addon_versions[0])
          else:
              # Fallback: find any version that looks like an addon version
              matches = re.findall(r'\"displayName\":\"GRIP[^\"]*?(v?[12]\.\d+\.\d+)', html)
              if matches:
                  v = matches[0]
                  if not v.startswith('v'):
                      v = 'v' + v
                  print(v)
              else:
                  print('Could not find addon version', file=sys.stderr)
                  sys.exit(1)
          ")
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Read current version from layout.tsx
        id: current_version
        run: |
          CURRENT=$(grep -o 'GRIP-EMS v[0-9]*\.[0-9]*\.[0-9]*' src/app/guide/layout.tsx | head -1)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Check if update is needed
        id: check
        run: |
          NEW="GRIP-EMS ${{ steps.fetch_version.outputs.version }}"
          CURRENT="${{ steps.current_version.outputs.current }}"
          if [ "$NEW" = "$CURRENT" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already up to date: $CURRENT"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Update needed: $CURRENT -> $NEW"
          fi

      - name: Update version strings in files
        if: steps.check.outputs.needed == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch_version.outputs.version }}"
          sed -i "s/GRIP-EMS v[0-9]*\.[0-9]*\.[0-9]*/GRIP-EMS ${NEW_VERSION}/g" src/app/guide/layout.tsx
          sed -i "s/GRIP-EMS v[0-9]*\.[0-9]*\.[0-9]*/GRIP-EMS ${NEW_VERSION}/g" src/app/guide/page.tsx
          echo "Updated files to $NEW_VERSION"

      - name: Commit and push changes
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/guide/layout.tsx src/app/guide/page.tsx
          git commit -m "Auto-update GRIP-EMS version to ${{ steps.fetch_version.outputs.version }}"
          git push
